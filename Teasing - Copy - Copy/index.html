<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Teasing</title>

  <style>
    :root{
      --bg1:#0b0f14;
      --bg2:#0a0a0a;
      --card: rgba(20, 24, 30, 0.72);
      --cardBorder: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.65);
      --accent: #4CAF50;
      --accent2:#00ffcc;
      --shadow: 0 20px 60px rgba(0,0,0,0.55);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      padding:24px 16px 40px;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      text-align:center;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(76,175,80,0.18), transparent 60%),
        radial-gradient(900px 500px at 80% 20%, rgba(0,255,204,0.12), transparent 60%),
        radial-gradient(700px 400px at 50% 90%, rgba(76,175,80,0.12), transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height:100vh;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:-120px;
      background:
        radial-gradient(600px 300px at 25% 20%, rgba(76,175,80,0.20), transparent 70%),
        radial-gradient(600px 300px at 75% 35%, rgba(0,255,204,0.16), transparent 70%);
      filter: blur(22px);
      opacity:0.9;
      animation: floatGlow 12s ease-in-out infinite alternate;
      z-index:-1;
    }

    @keyframes floatGlow{
      from{ transform: translate3d(-12px,-8px,0) scale(1); }
      to{ transform: translate3d(14px,10px,0) scale(1.02); }
    }

    h1{
      font-size: clamp(28px, 3.8vw, 44px);
      margin: 12px 0 8px;
      letter-spacing: 0.2px;
    }

    #statusRow{
      margin: 0 auto 14px;
      width: min(960px, 96vw);
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      color: var(--muted);
      font-weight: 650;
      font-size: 13px;
    }
    .pill{
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(20,24,30,0.55);
      padding: 8px 10px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
    }

    #mainContainer{
      background: var(--card);
      border: 1px solid var(--cardBorder);
      padding: 20px 20px 18px;
      border-radius: 18px;
      display:inline-block;
      margin-top: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position:relative;
      width: min(720px, 94vw);
    }

    #mainContainer::after{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:18px;
      pointer-events:none;
      box-shadow:
        0 0 0 1px rgba(76,175,80,0.12),
        0 0 35px rgba(76,175,80,0.14),
        0 0 50px rgba(0,255,204,0.10);
    }

    img{
      width:min(680px, 92vw);
      max-height: 72vh;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.45);
      background: rgba(0,0,0,0.12);
      transform: translateZ(0);
    }

    img.fade-in{ animation:fadeIn 0.55s ease-in-out; }
    @keyframes fadeIn{
      from{ opacity:0; transform: scale(0.985); filter: blur(2px); }
      to{ opacity:1; transform: scale(1); filter: blur(0); }
    }

    #displayText{
      font-size: clamp(18px, 2.3vw, 22px);
      font-weight: 800;
      margin-top: 14px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.7);
      color: var(--text);
      min-height: 28px;
    }

    #featureBar{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
      padding:12px;
      border-radius:14px;
      background: rgba(20,24,30,0.55);
      border:1px solid rgba(255,255,255,0.06);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      width: min(960px, 96vw);
      margin-left:auto;
      margin-right:auto;
    }

    button{
      padding:10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      cursor:pointer;
      background: rgba(35, 40, 48, 0.75);
      color: var(--text);
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      font-weight: 700;
    }
    button:hover{
      background: rgba(76,175,80,0.28);
      border-color: rgba(76,175,80,0.35);
      transform: translateY(-1px);
    }
    button:active{ transform: translateY(0px) scale(0.99); }

    input[type=range]{
      width: 150px;
      accent-color: var(--accent);
    }

    select, input[type=text]{
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(35,40,48,0.75);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      outline:none;
      font-weight: 650;
    }
    input[type=text]{ width: 180px; }

    #progressContainer{
      width: min(860px, 88vw);
      height: 12px;
      background: rgba(255,255,255,0.10);
      margin: 16px auto 0;
      border-radius: 999px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.07);
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }

    #progressBar{
      height:100%;
      width:0%;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(0,255,204,0.85), rgba(76,175,80,0.9));
      position:relative;
      transition: width 0.1s linear;
    }

    #progressBar::after{
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.22) 50%, transparent 100%);
      transform: translateX(-60%);
      animation: shimmer 1.4s linear infinite;
      opacity: 0.65;
      pointer-events:none;
    }
    @keyframes shimmer{ to{ transform: translateX(60%); } }

    #enduranceTimer{
      margin-top: 12px;
      font-size: 16px;
      font-weight: 700;
      color: var(--muted);
    }

    #settingsMenu{
      display:none;
      position:fixed;
      top:18px;
      right:18px;
      background: rgba(20,24,30,0.78);
      border: 1px solid rgba(255,255,255,0.08);
      padding:14px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      text-align:left;
      z-index:1000;
      max-width: 420px;
      backdrop-filter: blur(12px);
    }
    #settingsMenu h3{ margin:0 0 10px; }
    #settingsMenu label{
      display:block;
      margin-bottom:10px;
      font-size: 14px;
      color: var(--muted);
    }
    #settingsMenu span{
      display:inline-block;
      width:44px;
      text-align:right;
      color: var(--text);
      font-weight: 800;
      margin-left:6px;
    }
    .row{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .hint{ font-size:12px; opacity:0.8; margin-top:4px; }

    #settingsToggle{
      position:fixed;
      top:18px;
      left:18px;
      z-index:1100;
      padding:10px 14px;
    }

    @media (max-width: 420px){
      button{ padding:10px 12px; border-radius:12px; }
      #featureBar{ gap:8px; }
      input[type=range]{ width: 140px; }
      input[type=text]{ width: 160px; }
    }
  </style>
</head>

<body>
  <button id="settingsToggle" onclick="toggleSettings()">⚙️ Settings</button>

  <h1>Teasing</h1>

  <div id="statusRow">
    <div class="pill" id="handyStatus">Handy: unknown</div>
    <div class="pill" id="voiceStatus">Voice: OFF</div>
  </div>

  <div id="mainContainer">
    <img id="displayImage" src="" alt="">
    <p id="displayText">Get Ready...</p>
  </div>

  <div id="featureBar">
    <button onclick="prevImage()">⏮️ Prev</button>
    <button onclick="nextImage()">⏭️ Next</button>

    <button onclick="sendSpeed(10)">Slow</button>
    <button onclick="sendSpeed(30)">Medium</button>
    <button onclick="sendSpeed(60)">Fast</button>
    <button onclick="sendSpeed(90)">Max</button>

    <button onclick="stopSession()">⏸️ Stop</button>
    <button onclick="resumeSession()">▶️ Start/Resume</button>

    <input type="range" min="0" max="100" value="50" id="speedSlider" oninput="sendSpeed(this.value)">

    <select id="patternSelect" onchange="selectPattern()">
      <option value="random">Random</option>
      <option value="ramp">Ramp Up</option>
      <option value="pulse">Pulse</option>
      <option value="tease">Tease</option>
    </select>

    <button id="voiceToggle" onclick="toggleVoice()">🎤 Voice: OFF</button>
  </div>

  <div id="progressContainer"><div id="progressBar"></div></div>
  <div id="enduranceTimer">Endurance Time: 0s</div>

  <div id="settingsMenu">
    <h3>Session Settings</h3>

    <div class="row">
      <strong style="color:var(--text)">Difficulty:</strong>
      <select id="difficultySelect" onchange="applyPreset(this.value)">
        <option value="normal" selected>Normal</option>
        <option value="easy">Easy</option>
        <option value="hardcore">Hardcore</option>
      </select>
      <button onclick="applyPreset(document.getElementById('difficultySelect').value)">Apply Preset</button>
    </div>
    <div class="hint">Preset sets speed, duration, surprises. You can tweak sliders after.</div>

    <hr style="border:0;border-top:1px solid rgba(255,255,255,0.08);margin:12px 0;">

    <div class="row">
      <strong style="color:var(--text)">Handy:</strong>
      <input id="connectionKeyInput" type="text" placeholder="Connection Key">
      <button onclick="saveConnectionKey()">Save</button>
      <button onclick="testHandy()">Test</button>
    </div>
    <div class="hint">Key is saved locally in your browser. You can rotate it later if you want.</div>

    <hr style="border:0;border-top:1px solid rgba(255,255,255,0.08);margin:12px 0;">

    <label>Min Speed:
      <input type="range" id="minSpeedSlider" min="0" max="100" value="10" oninput="updateMinSpeedLabel(this.value)">
      <span id="minSpeedLabel">10</span>
    </label>

    <label>Max Speed:
      <input type="range" id="maxSpeedSlider" min="0" max="100" value="90" oninput="updateMaxSpeedLabel(this.value)">
      <span id="maxSpeedLabel">90</span>
    </label>

    <label>Stroke Range:
      <input type="range" id="strokeSlider" min="0" max="100" value="20" oninput="updateStrokeLabel(this.value)">
      <span id="strokeLabel">20</span>
    </label>

    <label>Random Duration Range (sec):
      <input type="range" id="minDurationSlider" min="5" max="60" value="15" oninput="updateMinDurationLabel(this.value)">
      <span id="minDurationLabel">15</span>
      -
      <input type="range" id="maxDurationSlider" min="10" max="120" value="45" oninput="updateMaxDurationLabel(this.value)">
      <span id="maxDurationLabel">45</span>
    </label>

    <label>Surprise Text Chance (%):
      <input type="range" id="surpriseTextChanceSlider" min="0" max="100" value="15" oninput="updateSurpriseTextChanceLabel(this.value)">
      <span id="surpriseTextChanceLabel">15</span>
    </label>

    <label>Surprise Image Chance (%):
      <input type="range" id="surpriseImageChanceSlider" min="0" max="100" value="10" oninput="updateSurpriseImageChanceLabel(this.value)">
      <span id="surpriseImageChanceLabel">10</span>
    </label>

    <label>Surprise Duration (sec):
      <input type="range" id="surpriseDurationSlider" min="1" max="10" value="3" oninput="updateSurpriseDurationLabel(this.value)">
      <span id="surpriseDurationLabel">3</span>
    </label>

    <button onclick="applySettings()">Apply Current Sliders</button>
  </div>

<script>
/* ---------------------------
   Settings toggle
---------------------------- */
function toggleSettings(){
  const menu = document.getElementById("settingsMenu");
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

/* ---------------------------
   Handy integration
---------------------------- */
const HANDY_BASE = "https://www.handyfeeling.com/api/handy/v2";
let connectionKey = localStorage.getItem("handy_connection_key") || "";
let handyReady = false;
let handyLastSpeed = 0;
let handyLastSendAt = 0; // throttle
const HANDY_THROTTLE_MS = 250;

function setHandyStatus(text){
  document.getElementById("handyStatus").innerText = "Handy: " + text;
}

function saveConnectionKey(){
  const v = (document.getElementById("connectionKeyInput").value || "").trim();
  connectionKey = v;
  localStorage.setItem("handy_connection_key", connectionKey);
  setHandyStatus(connectionKey ? "key saved" : "no key");
}

async function handyRequest(path, method="GET", bodyObj=null){
  if (!connectionKey) throw new Error("No connection key set");
  const opts = {
    method,
    headers: {
      "Content-Type": "application/json",
      "X-Connection-Key": connectionKey
    }
  };
  if (bodyObj) opts.body = JSON.stringify(bodyObj);

  const res = await fetch(`${HANDY_BASE}${path}`, opts);

  if (!res.ok) {
    const txt = await res.text().catch(()=>"(no body)");
    throw new Error(`${path} -> HTTP ${res.status}: ${txt}`);
  }
  const ct = res.headers.get("content-type") || "";
  if (ct.includes("application/json")) return await res.json();
  return await res.text();
}

async function handyCheckConnected(){
  const data = await handyRequest("/connected", "GET");
  return !!(data && data.connected);
}

async function handyStart(){
  const connected = await handyCheckConnected();
  if (!connected){
    handyReady = false;
    setHandyStatus("not connected");
    return false;
  }

  // HAMP mode
  await handyRequest("/mode", "PUT", { mode: 0 });

  // Start motion
  await handyRequest("/hamp/start", "PUT", {});

  handyReady = true;
  setHandyStatus("connected ✅");

  // Apply current stroke + last speed
  const stroke = parseInt(document.getElementById("strokeSlider")?.value || "20", 10);
  await handySetStrokeRange(stroke).catch(()=>{});
  if (handyLastSpeed > 0) await handySetSpeed(handyLastSpeed).catch(()=>{});
  return true;
}

async function handyStop(){
  try{
    await handyRequest("/hamp/stop", "PUT", {});
  } catch(e){
    // ignore if already stopped
  }
  handyReady = false;
  setHandyStatus("stopped");
}

async function handySetSpeed(percent){
  handyLastSpeed = Math.max(0, Math.min(100, Math.round(percent)));
  if (!handyReady) return;

  // throttle to avoid hammering
  const now = Date.now();
  if (now - handyLastSendAt < HANDY_THROTTLE_MS) return;
  handyLastSendAt = now;

  await handyRequest("/hamp/velocity", "PUT", { velocity: handyLastSpeed });
}

async function handySetStrokeRange(rangePercent){
  // Map range 0-100 to a centered min/max 0-100
  const range = Math.max(5, Math.min(100, Math.round(rangePercent)));
  let min = Math.round(50 - range/2);
  let max = Math.round(50 + range/2);
  min = Math.max(0, min);
  max = Math.min(100, max);

  await handyRequest("/slide", "PUT", { min, max });
}

async function testHandy(){
  try{
    setHandyStatus("testing…");
    const connected = await handyCheckConnected();
    setHandyStatus(connected ? "connected ✅" : "not connected");
  } catch(e){
    console.error(e);
    setHandyStatus("error (console)");
    alert("Handy test failed. Open your browser console for details.\n\nMost common causes:\n- Wrong key\n- Handy not online\n- CORS blocked by browser");
  }
}

/* ---------------------------
   Voice (optional)
---------------------------- */
let voiceEnabled = false;
function setVoiceStatus(){
  document.getElementById("voiceStatus").innerText = "Voice: " + (voiceEnabled ? "ON" : "OFF");
}
function toggleVoice(){
  voiceEnabled = !voiceEnabled;
  document.getElementById("voiceToggle").innerText = `🎤 Voice: ${voiceEnabled ? "ON" : "OFF"}`;
  setVoiceStatus();
}
// (Leave speakText() empty unless you wire ElevenLabs back in)
async function speakText(_text){ /* optional */ }

/* ---------------------------
   Game variables / behavior
---------------------------- */
let sessions=[], currentIndex=0, patternInterval, textInterval, enduranceInterval;
let currentPattern="random", paused=false, enduranceTime=0;

// Default duration range (ms)
let minDuration=15000, maxDuration=45000;

// Surprise settings
let surpriseTextChance=15, surpriseImageChance=10, surpriseDuration=3000;

// Surprise text + surprise images (from texts.json entries with "surprise": true)
const surpriseTexts=["Feeling brave?","Can you handle this?","Don't stop now!","Just a little more..."];
let surpriseImages = [];

// Prevent stacked timeouts
let nextImageTimeoutId = null;

/* ---------------------------
   Load texts.json
---------------------------- */
fetch("texts.json")
  .then(res => {
    if(!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  })
  .then(data=>{
    sessions = [];
    surpriseImages = [];

    for(const [filename, info] of Object.entries(data)){
      const isSurprise = info && info.surprise === true;

      if(isSurprise){
        surpriseImages.push("images/" + filename);
        continue;
      }

      sessions.push({
        src: "images/" + filename,
        text: (info && info.text) ? info.text : ["..."],
        pattern: (info && info.pattern) ? info.pattern : "random",
        minSpeed: 10,
        maxSpeed: 90,
        strokeRange: 20
      });
    }

    if(sessions.length === 0){
      document.getElementById("displayText").innerText = "texts.json loaded, but no normal images found.";
      return;
    }

    // Init UI from saved key
    document.getElementById("connectionKeyInput").value = connectionKey;
    setHandyStatus(connectionKey ? "key loaded" : "no key");
    setVoiceStatus();

    applyPreset("normal");
    showImage(0);
    startEnduranceTimer();
  })
  .catch(err=>{
    console.error("Failed to load texts.json:", err);
    document.getElementById("displayText").innerText = "Error: texts.json not found or invalid.";
  });

function selectPattern(){ currentPattern=document.getElementById("patternSelect").value; }

/* ---------------------------
   Sliders live updates
---------------------------- */
function updateMinSpeedLabel(val){document.getElementById("minSpeedLabel").innerText=val;}
function updateMaxSpeedLabel(val){document.getElementById("maxSpeedLabel").innerText=val;}
function updateStrokeLabel(val){
  document.getElementById("strokeLabel").innerText=val;
  // if running, apply stroke immediately
  if (handyReady){
    handySetStrokeRange(parseInt(val,10)).catch(console.error);
  }
}
function updateMinDurationLabel(val){document.getElementById("minDurationLabel").innerText=val; minDuration=parseInt(val)*1000;}
function updateMaxDurationLabel(val){document.getElementById("maxDurationLabel").innerText=val; maxDuration=parseInt(val)*1000;}
function updateSurpriseTextChanceLabel(val){document.getElementById("surpriseTextChanceLabel").innerText=val; surpriseTextChance=parseInt(val);}
function updateSurpriseImageChanceLabel(val){document.getElementById("surpriseImageChanceLabel").innerText=val; surpriseImageChance=parseInt(val);}
function updateSurpriseDurationLabel(val){document.getElementById("surpriseDurationLabel").innerText=val; surpriseDuration=parseInt(val)*1000;}

/* ---------------------------
   Presets
---------------------------- */
function applyPreset(level){
  const presets = {
    easy: {
      minSpeed: 5,
      maxSpeed: 55,
      strokeRange: 15,
      minDur: 25,
      maxDur: 60,
      surpriseTextChance: 8,
      surpriseImageChance: 5,
      surpriseDuration: 2
    },
    normal: {
      minSpeed: 10,
      maxSpeed: 85,
      strokeRange: 20,
      minDur: 15,
      maxDur: 45,
      surpriseTextChance: 15,
      surpriseImageChance: 10,
      surpriseDuration: 3
    },
    hardcore: {
      minSpeed: 20,
      maxSpeed: 100,
      strokeRange: 35,
      minDur: 8,
      maxDur: 22,
      surpriseTextChance: 25,
      surpriseImageChance: 18,
      surpriseDuration: 4
    }
  };

  const p = presets[level] || presets.normal;

  document.getElementById("minSpeedSlider").value = p.minSpeed;
  document.getElementById("maxSpeedSlider").value = p.maxSpeed;
  document.getElementById("strokeSlider").value = p.strokeRange;

  document.getElementById("minDurationSlider").value = p.minDur;
  document.getElementById("maxDurationSlider").value = p.maxDur;

  document.getElementById("surpriseTextChanceSlider").value = p.surpriseTextChance;
  document.getElementById("surpriseImageChanceSlider").value = p.surpriseImageChance;
  document.getElementById("surpriseDurationSlider").value = p.surpriseDuration;

  updateMinSpeedLabel(p.minSpeed);
  updateMaxSpeedLabel(p.maxSpeed);
  updateStrokeLabel(p.strokeRange);

  updateMinDurationLabel(p.minDur);
  updateMaxDurationLabel(p.maxDur);

  updateSurpriseTextChanceLabel(p.surpriseTextChance);
  updateSurpriseImageChanceLabel(p.surpriseImageChance);
  updateSurpriseDurationLabel(p.surpriseDuration);

  applySettings();
}

function applySettings(){
  if(!sessions.length) return;
  const item = sessions[currentIndex] || sessions[0];

  item.minSpeed = parseInt(document.getElementById("minSpeedSlider").value);
  item.maxSpeed = parseInt(document.getElementById("maxSpeedSlider").value);
  item.strokeRange = parseInt(document.getElementById("strokeSlider").value);

  minDuration = parseInt(document.getElementById("minDurationSlider").value)*1000;
  maxDuration = parseInt(document.getElementById("maxDurationSlider").value)*1000;

  surpriseTextChance = parseInt(document.getElementById("surpriseTextChanceSlider").value);
  surpriseImageChance = parseInt(document.getElementById("surpriseImageChanceSlider").value);
  surpriseDuration = parseInt(document.getElementById("surpriseDurationSlider").value)*1000;

  // If running, push stroke setting
  if (handyReady){
    handySetStrokeRange(item.strokeRange).catch(console.error);
  }
}

/* ---------------------------
   Endurance timer
---------------------------- */
function startEnduranceTimer(){
  clearInterval(enduranceInterval);
  enduranceInterval = setInterval(()=>{
    if(!paused){
      enduranceTime++;
      document.getElementById("enduranceTimer").innerText = `Endurance Time: ${enduranceTime}s`;
    }
  },1000);
}

/* ---------------------------
   Motion control hook
---------------------------- */
function sendSpeed(speed){
  // Always update UI; Handy call is best-effort
  handySetSpeed(speed).catch(err => console.error("handySetSpeed failed:", err));
}

/* ---------------------------
   Show image + patterns
---------------------------- */
function showImage(index){
  if(!sessions.length) return;

  if(index<0) index=sessions.length-1;
  if(index>=sessions.length) index=0;
  currentIndex=index;

  const item = sessions[currentIndex];
  const img = document.getElementById("displayImage");

  img.src = item.src;
  img.classList.remove("fade-in");
  void img.offsetWidth;
  img.classList.add("fade-in");

  clearInterval(patternInterval);
  clearInterval(textInterval);
  if(nextImageTimeoutId) clearTimeout(nextImageTimeoutId);

  let textIndex=0;
  document.getElementById("displayText").innerText=item.text[textIndex] || "";
  speakText(item.text[textIndex] || "");

  textInterval = setInterval(()=>{
    if(!paused && item.text.length > 0){
      textIndex=(textIndex+1)%item.text.length;
      const line=item.text[textIndex] || "";
      document.getElementById("displayText").innerText=line;
      speakText(line);
    }
  },5000);

  const duration = Math.floor(Math.random()*(maxDuration-minDuration+1))+minDuration;
  const startTime = Date.now();
  const stroke = item.strokeRange || (item.maxSpeed-item.minSpeed);

  patternInterval = setInterval(()=>{
    if(!paused){
      let speed;
      const pattern = item.pattern || currentPattern;

      if(pattern==="random"){
        speed=Math.floor(Math.random()*(item.maxSpeed-item.minSpeed+1))+item.minSpeed;
      } else if(pattern==="ramp"){
        speed=item.minSpeed+Math.floor(stroke*((Date.now()-startTime)/duration));
      } else if(pattern==="pulse"){
        const t=((Date.now()-startTime)%2000)/2000;
        speed=Math.round(item.minSpeed+stroke*Math.abs(Math.sin(t*Math.PI)));
      } else if(pattern==="tease"){
        const t=((Date.now()-startTime)%4000)/4000;
        speed=Math.round(item.minSpeed+stroke*0.4*Math.sin(t*Math.PI));
        if(speed<item.minSpeed) speed=item.minSpeed;
      } else {
        speed=Math.floor(Math.random()*(item.maxSpeed-item.minSpeed+1))+item.minSpeed;
      }

      sendSpeed(speed);
      document.getElementById("speedSlider").value=speed;

      const percent=Math.min(((Date.now()-startTime)/duration)*100,100);
      const bar=document.getElementById("progressBar");
      bar.style.width=percent+"%";

      // keep your colorful behavior
      bar.style.background = speed<30 ? "green" : (speed<70 ? "yellow" : "red");
    }
  },100);

  nextImageTimeoutId = setTimeout(()=>{
    if(!paused) nextImage();
  }, duration);
}

function nextImage(){ showImage(currentIndex+1); }
function prevImage(){ showImage(currentIndex-1); }

/* ---------------------------
   Pause / resume
---------------------------- */
function stopSession(){
  paused = true;
  handyStop().catch(console.error);
}

async function resumeSession(){
  if (paused) paused = false;

  // Start Handy if we have a key
  if (connectionKey){
    try{
      await handyStart();
    } catch(e){
      console.error(e);
      setHandyStatus("error (console)");
      // keep the game running even if Handy fails
    }
  } else {
    setHandyStatus("no key");
  }

  showImage(currentIndex);
}

/* ---------------------------
   Surprise features
---------------------------- */
function maybeSurprise(){
  if(paused) return;
  if(Math.random()*100<surpriseTextChance){
    const display=document.getElementById("displayText");
    const surpriseLine=surpriseTexts[Math.floor(Math.random()*surpriseTexts.length)];
    display.dataset.oldText=display.innerText;
    display.innerText=surpriseLine;
    speakText(surpriseLine);
    setTimeout(()=>{
      if(display.dataset.oldText) display.innerText=display.dataset.oldText;
    }, surpriseDuration);
  }
}

function maybeSurpriseImage(){
  if(paused) return;
  if(surpriseImages.length === 0) return;

  if(Math.random()*100<surpriseImageChance){
    const img=document.getElementById("displayImage");
    const oldSrc=img.src;
    const surprise=surpriseImages[Math.floor(Math.random()*surpriseImages.length)];
    img.src=surprise;
    setTimeout(()=>{ img.src=oldSrc; }, surpriseDuration);
  }
}

setInterval(maybeSurprise,5000);
setInterval(maybeSurpriseImage,7000);
</script>
